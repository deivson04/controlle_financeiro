name: Deploy para InfinityFree

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Baixando o código
        uses: actions/checkout@v4

      - name: Enviando para o FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ./htdocs/
          # O segredo está aqui: ignorar as pastas do sistema do GitHub
          exclude: |
            .git*
            .github*
            .vscode/
            vendor/**
            **/config.php
            **/conexao.php
